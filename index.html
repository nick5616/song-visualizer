<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Apps</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #05050f;
      color: #e8e8ff;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }
    a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 52px;
      border: 2px solid #3a3a5a;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
    }
    a:hover { border-color: #00ffe5; box-shadow: 0 0 32px rgba(0,255,229,0.2); }
    h2 {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 4px;
    }
    .song { color: #ff3cac; }
    .pitch { background: linear-gradient(90deg,#00ffe5,#ff3cac,#ffee00); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .midi { color: #c896ff; }
    .mic  { color: #5fd4ff; }
    .golden { color: #FFB830; }
    p { font-size: 11px; letter-spacing: 2px; color: #3a3a5a; }
  </style>
</head>
<body>
  <a href="song-visualizer/index.html">
    <h2 class="song">SONG VISUALIZER</h2>
    <p>AUDIO · WAVEFORM · CANVAS</p>
  </a>
  <a href="pitch-hero/index.html">
    <h2 class="pitch">PITCH HERO</h2>
    <p>SING · MIDI · PIANO ROLL</p>
  </a>
  <a href="smart-midi-recorder/index.html">
    <h2 class="midi">MIDI MUSE</h2>
    <p>CHORDS · THEORY · RECORD</p>
  </a>
  <a href="mic-monitor/index.html">
    <h2 class="mic">HOW DO I SOUND RIGHT NOW?</h2>
    <p>MIC · MONITOR · LATENCY</p>
  </a>
  <a href="golden-hour/index.html">
    <h2 class="golden">GOLDEN HOUR</h2>
    <p>AURORA · PARTICLES · TIME</p>
  </a>
</body>
</html>
